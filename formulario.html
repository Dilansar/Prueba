<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
 <body>
    <form action = "/enviar">  
        <label for="name">Nombre</label>
        <input type="text" placeholder="Escribe tu nombre" maxlength="5" minlength="2">
        <label for="contra">Contraseña </label>
        <input type="password" required minlength="8">
        <label for="numero">Numero </label>
        <input type="number" disabled >
        <br>
        <input type="submit">
        <input type="file">
        <input type="date">
        <input type="color">
        <input type="checkbox">
        <input type="radio">
        <input type="range">
        <input type="email">
        <input type="url">
        <input type="datatime-local">
        <input type="reset" value="borrar">
        <br>
        <textarea name="" rows="10"></textarea>
        <select name="" id="">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>
    </form>
</body>
</html>
